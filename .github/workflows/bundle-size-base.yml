name: Bundle size Base
on:
  push:
    branches: [main]

concurrency:
  # see https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#example-only-cancel-in-progress-jobs-or-runs-for-the-current-workflow
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: yarn
          node-version: 24

      - run: corepack enable
      - run: yarn install --immutable

      - name: Build packages & create reports
        run: yarn bundle-size

      - name: Prepare report
        run: npx monosize upload-report --branch=main --commit-sha ${{ github.sha }} --report-files-glob="dist/bundle-size/monosize.json"

      - name: Upload report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: monosize-report
          retention-days: 30
          if-no-files-found: error
          path: monosize-report.json
